name: Deploy TIL Site to GitHub Pages

on:
  # 1) til-site repo의 main 브랜치에 push 시
  push:
    branches: [main]
  # 2) TIL repo가 업데이트되었을 때 외부에서 트리거 (repository_dispatch)
  repository_dispatch:
    types: [til-updated]
  # 3) 수동 트리거
  workflow_dispatch:
  # 4) 매일 한 번 자동 빌드 (혹시 외부 트리거를 놓쳤을 경우의 안전망)
  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # 프로젝트 페이지로 배포한다면 '/til-site', 사용자 페이지(`<user>.github.io`)면 빈 문자열로 두세요.
  NEXT_PUBLIC_BASE_PATH: /til-site
  # RSS 절대 URL 생성용 (배포 도메인 기준)
  NEXT_PUBLIC_SITE_URL: https://baezy813.github.io
  # TIL repo 정보
  TIL_REPO_OWNER: baezy813
  TIL_REPO_NAME: TIL
  TIL_REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout til-site
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          # API rate limit 회피를 위해 액션 기본 GITHUB_TOKEN 사용.
          # TIL repo가 private이라면 별도 PAT를 secrets.TIL_READ_TOKEN으로 등록 후 사용하세요.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
